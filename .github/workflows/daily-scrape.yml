name: On-demand inventory scrape
on:
  workflow_dispatch: {}
  schedule:
    - cron: '1 8-17 * * 1-6'

# ============================================================
# OPTION A (recommended): Self-hosted runner
# ------------------------------------------------------------
# GitHub-hosted runners use Azure IPs that Cloudflare blocks.
# Run this workflow on your own PC instead:
#
#   1. Go to your GitHub repo → Settings → Actions → Runners
#   2. Click "New self-hosted runner" and follow the install steps
#      (takes ~5 minutes on Windows/Mac/Linux)
#   3. Change `runs-on: self-hosted` below to `runs-on: self-hosted`
#
# Your home IP is never blocked. The scraper will work immediately.
# ============================================================

# ============================================================
# OPTION B: JSON API via TOYOTA_API_URL secret
# ------------------------------------------------------------
# If you find the dealer's hidden JSON API endpoint:
#   1. Open Chrome DevTools → Network → Fetch/XHR
#   2. Load https://www.reddeertoyota.com/inventory/used/
#   3. Find a request that returns JSON vehicle data
#   4. Copy that full URL
#   5. Go to GitHub repo → Settings → Secrets → New secret
#      Name: TOYOTA_API_URL   Value: <the URL you copied>
#
# The scraper will hit that URL directly (no Cloudflare on API endpoints).
# ============================================================

jobs:
  scrape:
    # Change to `self-hosted` if using Option A
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          # Leave unset unless you have the API URL (Option B)
          TOYOTA_API_URL: ${{ secrets.TOYOTA_API_URL }}
        run: python src/script/toyota_scrapper.py

      - name: Commit CSV if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain -- public/data/inventory.csv)" ]; then
            git add public/data/inventory.csv
            git commit -m "chore(data): update inventory.csv [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
